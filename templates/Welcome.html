<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Social App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #4a5bb3 50%, #2d3e7a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1e293b;
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1100px;
            width: 90%;
            gap: 60px;
        }

        .left-section {
            flex: 1;
            text-align: center;
        }

        .app-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            background: #e0f2fe;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .app-logo svg {
            width: 50px;
            height: 50px;
        }

        .left-section h1 {
            font-size: 48px;
            font-weight: 300;
            color: #f0f9ff;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }

        .left-section p {
            font-size: 18px;
            color: #bae6fd;
            font-weight: 300;
        }

        .right-section {
            flex: 1;
            background: #ffffff;
            padding: 50px 45px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .right-section h2 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #0f172a;
            font-weight: 600;
        }

        .right-section p {
            color: #64748b;
            margin-bottom: 35px;
            font-size: 15px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #334155;
            border: 2px solid #cbd5e1;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
            border-color: #94a3b8;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 30px 0;
            color: #94a3b8;
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }

        .divider span {
            padding: 0 15px;
        }

        .features {
            margin-top: 35px;
            padding-top: 30px;
            border-top: 1px solid #e2e8f0;
        }

        .feature-item {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            color: #475569;
            font-size: 14px;
        }

        .feature-item svg {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            flex-shrink: 0;
        }

        @media (max-width: 968px) {
            .container {
                flex-direction: column;
                gap: 40px;
            }

            .left-section h1 {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-section">
            <div class="app-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="4"/>
                    <circle cx="12" cy="12" r="4"/>
                    <circle cx="18" cy="6" r="1" fill="#3b82f6"/>
                </svg>
            </div>
            <h1>SocialConnect</h1>
            <p>Share moments. Connect with friends. Discover the world.</p>
        </div>

        <div class="right-section">
            <h2>Get Started</h2>
            <p>Join millions sharing their stories</p>

            <a href="{{ url_for('auth.register') }}" class="btn btn-primary">Create Account</a>
           <a href="{{ url_for('auth.login') }}"   class="btn btn-secondary">Sign In</a>

            <div class="divider">
                <span>Why join us?</span>
            </div>

            <div class="features">
                <div class="feature-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                    Connect with people worldwide
                </div>
                <div class="feature-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5" fill="#3b82f6"/>
                        <path d="M21 15l-5-5L5 21"/>
                    </svg>
                    Share photos and videos
                </div>
                <div class="feature-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                    </svg>
                    Discover content you love
                </div>
            </div>
        </div>
    </div>
</body>
</html>
